  /servers:
    get:
      operationId: getServers
      tags:
      - servers
      summary: List all servers
      description: Search and browse public MCP servers in the Smithery registry. Supports full-text and semantic search via the `q` parameter, and filtering by deployment status, verification, ownership, and more.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServersListResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServersListError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServersListError'
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServersListError'
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: Search query for full-text and semantic search across server names and descriptions.
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
          maximum: 9007199254740991
        description: Page number (1-indexed).
      - in: query
        name: pageSize
        schema:
          type: integer
          minimum: 1
          maximum: 100
        description: Number of results per page (default 10, max 100).
      - in: query
        name: topK
        schema:
          type: integer
          minimum: 10
          maximum: 500
        description: Maximum number of candidate results to consider from the search index before pagination. The server applies a hard cap of 500 to keep the rerank window bounded; pass `seed` for stable deep pagination.
      - in: query
        name: fields
        schema:
          type: string
        description: Comma-separated list of fields to include in response
      - in: query
        name: ids
        schema:
          type: array
          items:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
        description: Filter by specific server IDs.
      - in: query
        name: qualifiedName
        schema:
          type: string
        description: 'Exact match on the server''s qualified name (e.g. "smithery/hello-world"). Deprecated: use GET /servers/:namespace/:server instead.'
      - in: query
        name: namespace
        schema:
          type: string
        description: Filter by the namespace that owns the server.
      - in: query
        name: remote
        schema:
          type: string
          enum:
          - '0'
          - '1'
          - 'true'
          - 'false'
        description: Filter by remote status. Remote servers are accessed via URL; non-remote servers run locally via stdio.
      - in: query
        name: isDeployed
        schema:
          type: string
          enum:
          - '0'
          - '1'
          - 'true'
          - 'false'
        description: Filter by deployment status. Deployed servers are hosted on Smithery infrastructure.
      - in: query
        name: verified
        schema:
          type: string
          enum:
          - '0'
          - '1'
          - 'true'
          - 'false'
        description: Filter to only verified servers.
      - in: query
        name: smitheryManaged
        schema:
          type: string
          enum:
          - '0'
          - '1'
          - 'true'
          - 'false'
        description: Filter to servers whose namespace is owned by the Smithery org.
      - in: query
        name: ownerId
        schema:
          type: string
        description: Filter by the server owner's user ID.
      - in: query
        name: repoOwner
        schema:
          type: string
        description: Filter by GitHub repository owner from repository_url.
      - in: query
        name: repoName
        schema:
          type: string
        description: Filter by GitHub repository name from repository_url.
      - in: query
        name: seed
        schema:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        description: Random seed for deterministic pagination. When provided, results use a stable sort order that is consistent across pages for the same seed value.
      x-codeSamples:
      - lang: JavaScript
        source: "import Smithery from '@smithery/api';\n\nconst client = new Smithery({\n  apiKey: process.env['SMITHERY_API_KEY'], // This is the default and can be omitted\n});\n\n// Automatically fetches more pages as needed.\nfor await (const serverListResponse of client.servers.list()) {\n  console.log(serverListResponse.id);\n}"
components:
  schemas:
    Server:
      type: object
      properties:
        qualifiedName:
          type: string
          example: smithery/hello-world
        displayName:
          type: string
          example: Hello World
        description:
          type: string
          example: A simple hello world server
        iconUrl:
          anyOf:
          - type: string
          - type: 'null'
          example: https://example.com/icon.png
        remote:
          type: boolean
          example: true
        deploymentUrl:
          anyOf:
          - type: string
          - type: 'null'
          example: https://api.example.com
        connections:
          type: array
          items:
            anyOf:
            - $ref: '#/components/schemas/StdioConnection'
            - $ref: '#/components/schemas/HttpConnection'
        security:
          anyOf:
          - $ref: '#/components/schemas/ServerSecurity'
          - type: 'null'
        tools:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/ServerTool'
          - type: 'null'
        resources:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/ServerResource'
          - type: 'null'
        prompts:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/ServerPrompt'
          - type: 'null'
      required:
      - qualifiedName
      - displayName
      - description
      - iconUrl
      - remote
      - deploymentUrl
      - connections
      - security
      - tools
      - resources
      - prompts
      additionalProperties: false
    ToolOutputSchema:
      id: ToolOutputSchema
      type: object
      properties:
        type:
          type: string
          const: object
        properties:
          $ref: '#/components/schemas/OutputSchemaProperties'
        required:
          type: array
          items:
            type: string
      required:
      - type
      additionalProperties: false
    DeploymentInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
        status:
          type: string
          description: 'Current status: QUEUED, WORKING, SUCCESS, FAILURE, FAILURE_SCAN, AUTH_REQUIRED, AUTH_TIMEOUT, CANCELLED, or INTERNAL_ERROR.'
        type:
          type: string
          description: 'Release type: hosted_shttp (Smithery-hosted), external_shttp (external URL), or stdio (local binary).'
        commit:
          description: Git commit SHA that triggered this release.
          anyOf:
          - type: string
          - type: 'null'
        commitMessage:
          description: Git commit message associated with this release.
          anyOf:
          - type: string
          - type: 'null'
        branch:
          description: Git branch this release was built from.
          anyOf:
          - type: string
          - type: 'null'
        upstreamUrl:
          description: Upstream MCP server URL. Present only for external releases.
          anyOf:
          - type: string
          - type: 'null'
        logs:
          description: Pipeline log entries. Only included when fetching a single release.
          type: array
          items:
            $ref: '#/components/schemas/DeploymentLogEntry'
        mcpUrl:
          description: The MCP endpoint URL for connecting to this server.
          type: string
          format: uri
        createdAt:
          type: string
          description: ISO 8601 timestamp of when the release was created.
        updatedAt:
          type: string
          description: ISO 8601 timestamp of the last status change.
      required:
      - id
      - status
      - type
      - createdAt
      - updatedAt
      additionalProperties: false
    OutputSchemaProperties:
      id: OutputSchemaProperties
      type: object
      propertyNames:
        type: string
      additionalProperties: {}
    ExceptionEntry:
      type: object
      properties:
        timestamp:
          type: string
          example: '2026-01-04 10:53:39'
        name:
          type: string
          example: TypeError
        message:
          type: string
          example: Cannot read property 'x' of undefined
      required:
      - timestamp
      - name
      - message
      additionalProperties: false
    ServerSummary:
      type: object
      properties:
        id:
          type: string
          example: abc123
        qualifiedName:
          type: string
          description: Unique identifier in namespace/slug format.
          example: smithery/hello-world
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          description: The namespace this server belongs to, or null if unassigned.
          example: smithery-ai
        slug:
          anyOf:
          - type: string
          - type: 'null'
          description: URL-friendly short name within the namespace.
          example: hello-world
        displayName:
          type: string
          example: Hello World
        description:
          type: string
          example: A simple hello world server
        iconUrl:
          anyOf:
          - type: string
          - type: 'null'
          example: https://example.com/icon.png
        verified:
          type: boolean
          description: Whether this server has been verified by Smithery.
          example: true
        useCount:
          type: number
          description: Total number of times this server has been connected to.
          example: 42
        remote:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Whether the server is accessed via URL (true) or runs locally via stdio (false). Null if unknown.
          example: true
        isDeployed:
          type: boolean
          description: Whether the server is currently hosted on Smithery infrastructure.
          example: true
        createdAt:
          type: string
          description: ISO 8601 timestamp of when the server was registered.
          example: '2024-01-01T00:00:00.000Z'
        homepage:
          type: string
          description: The server owner's homepage URL, or the server's Smithery page as a fallback. Will become nullable in a future release.
          example: https://example.com
        bySmithery:
          type: boolean
          description: Whether this server is maintained by Smithery (i.e. owned by the Smithery organization).
          example: false
        owner:
          anyOf:
          - type: string
          - type: 'null'
          description: User ID of the server owner, or null for community servers.
          example: user_abc123
        score:
          anyOf:
          - type: number
          - type: 'null'
          description: RRF relevance score from search (null for browse requests).
          example: 0.016
      required:
      - id
      - qualifiedName
      - namespace
      - slug
      - displayName
      - description
      - iconUrl
      - verified
      - useCount
      - remote
      - isDeployed
      - createdAt
      - homepage
      - bySmithery
      - owner
      - score
      additionalProperties: false
      id: ServerSummary
    DeploymentError:
      type: object
      properties:
        error:
          type: string
          example: Server not found
      required:
      - error
      additionalProperties: false
    ServerTool:
      type: object
      properties:
        name:
          type: string
          example: get_weather
        description:
          anyOf:
          - type: string
          - type: 'null'
          example: Get current weather
        inputSchema:
          $ref: '#/components/schemas/ToolInputSchema'
        outputSchema:
          $ref: '#/components/schemas/ToolOutputSchema'
      required:
      - name
      - description
      - inputSchema
      additionalProperties: false
      id: ServerTool
    ServerPrompt:
      type: object
      properties:
        name:
          type: string
          example: summarize
        description:
          example: Summarize the given text
          type: string
        arguments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: text
              description:
                example: The text to summarize
                type: string
              required:
                example: true
                type: boolean
            required:
            - name
            additionalProperties: false
      required:
      - name
      additionalProperties: false
      id: ServerPrompt
    RuntimeLogsResponse:
      type: object
      properties:
        invocations:
          type: array
          items:
            $ref: '#/components/schemas/Invocation'
        total:
          type: number
          description: Total invocations matching query
      required:
      - invocations
      - total
      additionalProperties: false
    InvocationResponse:
      type: object
      properties:
        status:
          type: number
          example: 200
        outcome:
          type: string
          example: ok
      required:
      - status
      - outcome
      additionalProperties: false
      id: InvocationResponse
    StdioConnection:
      type: object
      properties:
        type:
          type: string
          const: stdio
        bundleUrl:
          type: string
          format: uri
        runtime:
          type: string
          enum:
          - node
          - binary
          - python
          - bun
        configSchema:
          $ref: '#/components/schemas/ConfigSchema'
      required:
      - type
      - bundleUrl
      - runtime
      - configSchema
      additionalProperties: false
      id: StdioConnection
    InputSchemaProperties:
      id: InputSchemaProperties
      type: object
      propertyNames:
        type: string
      additionalProperties:
        x-stainless-any: true
    ServersListResponse:
      type: object
      properties:
        servers:
          type: array
          items:
            $ref: '#/components/schemas/ServerSummary'
        pagination:
          type: object
          properties:
            currentPage:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
              description: Current page number (1-indexed).
              example: 1
            pageSize:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
              description: Number of results per page.
              example: 10
            totalPages:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
              description: Total number of pages available.
              example: 5
            totalCount:
              type: integer
              minimum: -9007199254740991
              maximum: 9007199254740991
              description: Total number of matching servers.
              example: 42
          required:
          - currentPage
          - pageSize
          - totalPages
          - totalCount
          additionalProperties: false
      required:
      - servers
      - pagination
      additionalProperties: false
    ConfigSchema:
      type: object
      propertyNames:
        type: string
      additionalProperties:
        x-stainless-any: true
    InvocationDuration:
      type: object
      properties:
        cpuMs:
          type: number
          example: 5
        wallMs:
          type: number
          example: 743
      required:
      - cpuMs
      - wallMs
      additionalProperties: false
      id: InvocationDuration
    RegistryError:
      type: object
      properties:
        error:
          type: string
          example: Server not found
      required:
      - error
      additionalProperties: false
    DeploymentLogEntryError:
      type: object
      properties:
        message:
          type: string
      additionalProperties: false
      id: DeploymentLogEntryError
    ServersListError:
      type: object
      properties:
        error:
          type: string
          example: Server not found
      required:
      - error
      additionalProperties: false
    ResumeResponse:
      type: object
      properties:
        status:
          type: string
          example: WORKING
        deploymentId:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
      required:
      - status
      - deploymentId
      additionalProperties: false
    RuntimeLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          example: '2026-01-04 10:53:39'
        level:
          type: string
          example: info
        message:
          type: string
          example: Processing request...
      required:
      - timestamp
      - level
      - message
      additionalProperties: false
    ServerSecurity:
      type: object
      properties:
        scanPassed:
          type: boolean
          example: true
      required:
      - scanPassed
      additionalProperties: false
      id: ServerSecurity
    Invocation:
      type: object
      properties:
        id:
          type: string
          example: 625f9ce6-f179-4f23-b3e3-4de28b52b39d
        timestamp:
          type: string
          example: '2026-01-04 10:53:39'
        request:
          $ref: '#/components/schemas/InvocationRequest'
        response:
          $ref: '#/components/schemas/InvocationResponse'
        duration:
          $ref: '#/components/schemas/InvocationDuration'
        logs:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeLogEntry'
        exceptions:
          type: array
          items:
            $ref: '#/components/schemas/ExceptionEntry'
      required:
      - id
      - timestamp
      - request
      - response
      - duration
      - logs
      - exceptions
      additionalProperties: false
    ServerResource:
      type: object
      properties:
        name:
          type: string
          example: config://settings
        uri:
          type: string
          example: config://app/settings
        description:
          example: Application settings
          type: string
        mimeType:
          example: application/json
          type: string
      required:
      - name
      - uri
      additionalProperties: false
      id: ServerResource
    DeployResponse:
      type: object
      properties:
        deploymentId:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          description: Unique identifier for this release.
          example: 123e4567-e89b-12d3-a456-426614174000
        status:
          type: string
          description: Initial status. Will be WORKING while the release is in progress.
          example: WORKING
        mcpUrl:
          type: string
          format: uri
          description: The MCP endpoint URL for connecting to this server once published.
          example: https://slug.run.tools
        warnings:
          description: Non-fatal warnings encountered during submission.
          type: array
          items:
            type: string
      required:
      - deploymentId
      - status
      - mcpUrl
      additionalProperties: false
    ToolInputSchema:
      type: object
      properties:
        type:
          type: string
          const: object
        properties:
          $ref: '#/components/schemas/InputSchemaProperties'
      required:
      - type
      additionalProperties: false
      id: ToolInputSchema
    HttpConnection:
      type: object
      properties:
        type:
          type: string
          const: http
        deploymentUrl:
          type: string
        configSchema:
          $ref: '#/components/schemas/ConfigSchema'
      required:
      - type
      - deploymentUrl
      - configSchema
      additionalProperties: false
      id: HttpConnection
    DeploymentLogEntry:
      type: object
      properties:
        stage:
          type: string
          enum:
          - deploy
          - scan
          - metadata
          - publish
          description: 'Pipeline stage: deploy (bundle upload), scan (security/OAuth check), metadata (tool discovery), publish (generated artifacts).'
        level:
          type: string
          description: 'Log level: ''start'', ''end'', ''info'', ''success'', or ''failure''.'
        message:
          type: string
          description: Human-readable log message.
        timestamp:
          type: string
          description: ISO 8601 timestamp of the log entry.
        error:
          description: Error details, present only when the stage failed.
          $ref: '#/components/schemas/DeploymentLogEntryError'
      required:
      - stage
      - level
      - message
      - timestamp
      additionalProperties: false
    InvocationRequest:
      type: object
      properties:
        method:
          type: string
          example: POST
        url:
          type: string
          example: https://gateway.smithery.ai/@smithery/unicorn
      required:
      - method
      - url
      additionalProperties: false
      id: InvocationRequest
    RuntimeLogsError:
      type: object
      properties:
        error:
          type: string
          example: Server not found
      required:
      - error
      additionalProperties: false
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Smithery API key as Bearer token
