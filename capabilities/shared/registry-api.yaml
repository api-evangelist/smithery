naftiko: "1.0.0-alpha1"

info:
  label: Smithery Registry API
  description: >-
    The Smithery Registry API provides access to the MCP server registry for
    discovering, managing, and publishing Model Context Protocol servers and skills.
  tags:
    - Smithery
    - MCP
    - Registry
    - AI Agents
    - Servers
    - Skills
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMITHERY_API_KEY: SMITHERY_API_KEY

capability:
  consumes:
    - type: http
      namespace: smithery-registry
      baseUri: https://api.smithery.ai
      description: Smithery Registry API for MCP server and skill management
      authentication:
        type: bearer
        token: "{{SMITHERY_API_KEY}}"
      resources:
        - name: servers
          path: /servers
          description: MCP server registry
          operations:
            - name: list-servers
              method: GET
              description: Search and browse public MCP servers in the registry
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: Full-text and semantic search query
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number (1-indexed)
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: Results per page (1-100, default 10)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: server
          path: /servers/{qualifiedName}
          description: Individual MCP server management
          operations:
            - name: get-server
              method: GET
              description: Retrieve server details including tools and connections
              inputParameters:
                - name: qualifiedName
                  in: path
                  type: string
                  required: true
                  description: The server qualified name (namespace/server)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-server
              method: DELETE
              description: Permanently delete a server and its resources
              inputParameters:
                - name: qualifiedName
                  in: path
                  type: string
                  required: true
                  description: The server qualified name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: server-releases
          path: /servers/{qualifiedName}/releases
          description: Server release management
          operations:
            - name: list-releases
              method: GET
              description: List releases ordered by most recent first
              inputParameters:
                - name: qualifiedName
                  in: path
                  type: string
                  required: true
                  description: The server qualified name
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: skills
          path: /skills
          description: Reusable skill discovery
          operations:
            - name: list-skills
              method: GET
              description: Search and browse reusable skills
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: Search query for skills
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: skill
          path: /skills/{namespace}/{slug}
          description: Individual skill management
          operations:
            - name: get-skill
              method: GET
              description: Get a single skill by namespace and slug
              inputParameters:
                - name: namespace
                  in: path
                  type: string
                  required: true
                  description: The skill namespace
                - name: slug
                  in: path
                  type: string
                  required: true
                  description: The skill slug
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tokens
          path: /tokens
          description: Service token management
          operations:
            - name: create-token
              method: POST
              description: Create a service token for machine-to-machine authentication
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  scopes: "{{tools.scopes}}"

        - name: health
          path: /health
          description: Service health check
          operations:
            - name: check-health
              method: GET
              description: Check if the service is running
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: smithery-registry-rest
      resources:
        - path: /v1/servers
          name: servers
          description: MCP server registry
          operations:
            - method: GET
              name: list-servers
              description: Search MCP servers in the registry
              call: "smithery-registry.list-servers"
              with:
                q: "rest.q"
                page: "rest.page"
                pageSize: "rest.pageSize"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/servers/{qualifiedName}
          name: server
          description: Individual MCP server
          operations:
            - method: GET
              name: get-server
              description: Get MCP server details
              call: "smithery-registry.get-server"
              with:
                qualifiedName: "rest.qualifiedName"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/skills
          name: skills
          description: Skills registry
          operations:
            - method: GET
              name: list-skills
              description: Search skills in the registry
              call: "smithery-registry.list-skills"
              with:
                q: "rest.q"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: smithery-registry-mcp
      transport: http
      tools:
        - name: list-servers
          description: Search and browse MCP servers in the Smithery registry
          hints:
            readOnly: true
            openWorld: true
          call: "smithery-registry.list-servers"
          with:
            q: "tools.q"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-server
          description: Get detailed information about a specific MCP server
          hints:
            readOnly: true
            openWorld: true
          call: "smithery-registry.get-server"
          with:
            qualifiedName: "tools.qualifiedName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-skills
          description: Search and browse reusable AI skills
          hints:
            readOnly: true
            openWorld: true
          call: "smithery-registry.list-skills"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-skill
          description: Get a specific skill by namespace and slug
          hints:
            readOnly: true
            openWorld: true
          call: "smithery-registry.get-skill"
          with:
            namespace: "tools.namespace"
            slug: "tools.slug"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-releases
          description: List releases for an MCP server
          hints:
            readOnly: true
            openWorld: true
          call: "smithery-registry.list-releases"
          with:
            qualifiedName: "tools.qualifiedName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: check-health
          description: Check the health status of the Smithery service
          hints:
            readOnly: true
            openWorld: true
          call: "smithery-registry.check-health"
          outputParameters:
            - type: object
              mapping: "$."
