naftiko: 1.0.0-alpha2
info:
  label: Smithery Platform API — domains
  description: 'Smithery Platform API — domains. 2 operations. Lead operation: List domains. Self-contained Naftiko capability
    covering one Smithery business surface.'
  tags:
  - Smithery
  - domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SMITHERY_API_KEY: SMITHERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: smithery-domains
    baseUri: https://api.smithery.ai
    description: Smithery Platform API — domains business capability. Self-contained, no shared references.
    resources:
    - name: servers-qualifiedName-domains
      path: /servers/{qualifiedName}/domains
      operations:
      - name: getserversnamespacedomains
        method: GET
        description: List domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: qualifiedName
          in: path
          type: string
          description: The server's qualified name (e.g. 'namespace/server' or 'namespace' for namespace-only servers). Use
            %2F to encode the slash.
          required: true
    - name: servers-qualifiedName-domains-domainId
      path: /servers/{qualifiedName}/domains/{domainId}
      operations:
      - name: patchserversnamespacedomainsdomainid
        method: PATCH
        description: Update managed domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: qualifiedName
          in: path
          type: string
          description: The server's qualified name (e.g. 'namespace/server' or 'namespace' for namespace-only servers). Use
            %2F to encode the slash.
          required: true
        - name: domainId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.SMITHERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: smithery-domains-rest
    port: 8080
    description: REST adapter for Smithery Platform API — domains. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/servers/{qualifiedname}/domains
      name: servers-qualifiedname-domains
      description: REST surface for servers-qualifiedName-domains.
      operations:
      - method: GET
        name: getserversnamespacedomains
        description: List domains
        call: smithery-domains.getserversnamespacedomains
        with:
          qualifiedName: rest.qualifiedName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servers/{qualifiedname}/domains/{domainid}
      name: servers-qualifiedname-domains-domainid
      description: REST surface for servers-qualifiedName-domains-domainId.
      operations:
      - method: PATCH
        name: patchserversnamespacedomainsdomainid
        description: Update managed domain
        call: smithery-domains.patchserversnamespacedomainsdomainid
        with:
          qualifiedName: rest.qualifiedName
          domainId: rest.domainId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: smithery-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Smithery Platform API — domains. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-domains
      description: List domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: smithery-domains.getserversnamespacedomains
      with:
        qualifiedName: tools.qualifiedName
      outputParameters:
      - type: object
        mapping: $.
    - name: update-managed-domain
      description: Update managed domain
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: smithery-domains.patchserversnamespacedomainsdomainid
      with:
        qualifiedName: tools.qualifiedName
        domainId: tools.domainId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
